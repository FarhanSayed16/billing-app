services:
  - type: web
    name: billpush-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npx prisma migrate deploy && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
